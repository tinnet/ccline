[tools]
rust = "latest"
cargo-dist = "latest"
"github:betterleaks/betterleaks" = "latest"
hk = "latest"

[tasks.build]
run = "cargo build --release"
description = "Build release binary"
depends = ["test"]

[tasks.dev]
run = "cargo build"
description = "Build debug binary"

[tasks.test]
run = "cargo test"
description = "Run tests"

[tasks.format]
alias = "fmt"
run = "cargo fmt"
description = "Auto-format code"

[tasks.lint]
run = "cargo clippy -- -D warnings && cargo fmt --check"
description = "Check formatting + lint"

[tasks.bench]
depends = ["build"]
description = "Benchmark Rust binary against bash and sh"
run = """
echo "Benchmarking with input:"
jq . bench-input.json
echo ""
hyperfine \
    --warmup 3 \
    --runs 50 \
    --shell=none \
    --input bench-input.json \
    --command-name "rust" "./target/release/ccline" \
    --command-name "bash" "bash ./statusline.sh" \
    --command-name "zsh" "zsh ./statusline.sh" \
    --command-name "sh" "sh ./statusline.sh"
"""

[tasks.scan-secrets]
run = "betterleaks git --pre-commit"
description = "Scan for secrets in staged changes"
