[tools]
rust = "latest"
cargo-dist = "latest"
"github:betterleaks/betterleaks" = "latest"
hk = "latest"
pkl = "latest"

[tasks.build]
run = "cargo build --release"
description = "Build release binary"
depends = ["test"]

[tasks.dev]
run = "cargo build"
description = "Build debug binary"

[tasks.test]
run = "cargo test"
description = "Run tests"

[tasks.format]
alias = "fmt"
run = "cargo fmt"
description = "Auto-format code"

[tasks.lint]
run = "cargo clippy -- -D warnings && cargo fmt --check"
description = "Check formatting + lint"

[tasks.bench]
depends = ["build"]
description = "Benchmark Rust binary against bash and sh"
run = """
echo "Benchmarking with input: ./bench/bench-input.json"
echo ""
hyperfine \
    --warmup 5 \
    --shell=none \
    --input ./bench/bench-input.json \
    --command-name "ccline" "./target/release/ccline" \
    --command-name "ccline.sh (via bash)" "bash ./bench/ccline.sh" \
    --command-name "ccline.sh (via zsh)" "zsh ./bench/ccline.sh" \
    --command-name "ccline.sh (via sh)" "sh ./bench/ccline.sh" \
    --command-name "claude-powerline (defaults)" "mise x npm:@owloops/claude-powerline@1.19.0 -- claude-powerline" \
    --command-name "ccstatusline (defaults)" "mise x npm:ccstatusline@2.2.2 -- ccstatusline" \
    --command-name "starship-claude (defaults)" "mise x starship@latest -- bash ./bench/starship-claude.sh --no-progress"
"""

[tasks.scan-secrets]
run = "betterleaks dir ."
description = "Scan for secrets in the project"

[tasks.pre-commit]
run = "betterleaks git --pre-commit"
description = "Scan for secrets in staged changes"
